kind = "web"
previewPath = "/"
title = "Cascadia Oceanic"
version = "1.0.0"
id = "artifacts/cascadia-oceanic"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20457

[services.development]
run = "pnpm --filter @workspace/cascadia-oceanic run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cascadia-oceanic", "run", "build" ]
publicDir = "artifacts/cascadia-oceanic/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20457"
BASE_PATH = "/"
